name: repo2docker-dockerhub
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Confirm checked-out submodule pointers
        run: |
          set -euo pipefail
          echo "Using submodule commits pinned by this repository:"; git submodule status --recursive

      - name: Set up Python for lock validation
        uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.14"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Validate locked dependency sync
        run: uv sync --locked --no-dev

      - name: Remove binder/Dockerfile for CI build
        run: |
          if [ -f binder/Dockerfile ]; then
            echo "Removing generated binder/Dockerfile so repo2docker builds from repository contents"
            rm -f binder/Dockerfile
          fi

      - name: Derive lowercase image name
        id: image_name
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          REPO_NAME_LC="$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')"
          echo "REPO_NAME_LC=$REPO_NAME_LC" >> $GITHUB_ENV
          echo "image_name=${{ secrets.DOCKERHUB_USERNAME }}/$REPO_NAME_LC" >> $GITHUB_OUTPUT

      - name: Build and push with repo2docker (Docker Hub)
        id: r2d
        uses: jupyterhub/repo2docker-action@master
        with:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKER_REGISTRY: docker.io
          IMAGE_NAME: ${{ steps.image_name.outputs.image_name }}
          # Do not set BINDER_CACHE (Quay-specific)

      - name: Compute short SHA and image ref
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "IMAGE_REF=${{ secrets.DOCKERHUB_USERNAME }}/$REPO_NAME_LC:$SHORT_SHA" >> $GITHUB_ENV

      - name: Create binder/Dockerfile from built image
        run: |
          printf '# Github Action Built Image.\nFROM %s\n' "$IMAGE_REF" > binder/Dockerfile
          echo "Created binder/Dockerfile with base image $IMAGE_REF"

      - name: Append submodule hashes and commit URLs to Dockerfile
        run: |
          ts=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          echo "# Submodule hashes and commit URLs for this build (generated at $ts UTC, parent repo $GITHUB_SHA)" >> binder/Dockerfile

          if [ -f .gitmodules ]; then
            for submodule in $(git config --file .gitmodules --get-regexp path | awk '{print $2}'); do
              url=$(git config -f .gitmodules submodule.$submodule.url || echo "UNKNOWN_URL")
              pointer=$(git ls-tree HEAD "$submodule" 2>/dev/null | awk '{print $3}')

              if [ -z "$pointer" ]; then
                pointer=$(git -C "$submodule" rev-parse HEAD 2>/dev/null || echo "UNKNOWN_HASH")
              fi

              if [ "$pointer" != "UNKNOWN_HASH" ] && [ -n "$pointer" ]; then
                pointer_short=${pointer:0:12}
              else
                pointer_short=$pointer
              fi

              norm_url=$url

              case "$norm_url" in
                git@github.com:*) norm_url=https://github.com/$(echo "$norm_url" | sed 's#git@github.com:##; s#\.git$##');;
                *.git) norm_url=$(echo "$norm_url" | sed 's#\.git$##');;
              esac

              if echo "$norm_url" | grep -q '^https://github.com/'; then
                if [ "$pointer" = "UNKNOWN_HASH" ] || [ -z "$pointer" ]; then
                  echo "# $submodule: (could not determine commit) $norm_url" >> binder/Dockerfile
                else
                  echo "# $submodule: $pointer_short $norm_url/tree/$pointer_short" >> binder/Dockerfile
                fi
              else
                echo "# $submodule: $pointer_short $url/tree/$pointer_short" >> binder/Dockerfile
              fi
            done
          else
            echo "# (No submodules)" >> binder/Dockerfile
          fi

      - name: Commit and push binder/Dockerfile and retry on race
        env:
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          # Get current branch name
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Current branch: $CURRENT_BRANCH"
          git add binder/Dockerfile
          if git diff --cached --quiet; then
            echo "No Binder Dockerfile changes to commit"; exit 0; fi
          git commit -m "chore: update Binder base image tag"
          attempts=5
          for i in $(seq 1 $attempts); do
            echo "Attempt $i push to $CURRENT_BRANCH..."
            if git push origin HEAD:$CURRENT_BRANCH; then
              echo "Push succeeded"; exit 0; fi
            echo "Initial/previous push failed, attempting to rebase onto origin/$CURRENT_BRANCH and retry (attempt $i).";
            git fetch origin
            git rebase origin/$CURRENT_BRANCH || { echo "Rebase failed; aborting."; git rebase --abort || true; exit 1; }
            sleep $((3 * i))
          done
          echo "Failed to push after $attempts attempts"; exit 1
